name: release

on:
  push:
    tags: ['v*']

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches Cargo.toml version
        id: parse
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          tag="${REF_NAME#v}"
          if [ -z "$version" ]; then
            echo "::error::Failed to parse version from Cargo.toml"
            exit 1
          fi
          if [ "$version" != "$tag" ]; then
            echo "::error::Tag $REF_NAME does not match Cargo.toml version $version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  test:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  publish:
    needs: [verify, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if cargo search kusara 2>/dev/null | grep -q "^kusara = \"${VERSION}\""; then
            echo "kusara@$VERSION already published — skipping"
          else
            echo "Publishing kusara@$VERSION..."
            cargo publish
          fi
